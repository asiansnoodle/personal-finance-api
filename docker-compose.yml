services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: financeuser
      POSTGRES_PASSWORD: financepass
      POSTGRES_DB: financedb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeuser -d financedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Inside the Compose network the app reaches Postgres at host "db".
      DATABASE_URL: postgresql://financeuser:financepass@db:5432/financedb
      # Secrets are interpolated from the gitignored .env file, never hardcoded.
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required (set it in .env)}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    # Apply migrations before the API starts so a fresh DB volume has its schema.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
